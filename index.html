<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN Som Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #0f0f0f; color: white; padding: 20px; }
        
        /* Cabeçalho e Busca */
        header { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        h1 { color: #ff0000; font-size: 24px; }
        .search-box { display: flex; width: 100%; max-width: 600px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 20px 0 0 20px; background: #121212; color: white; outline: none; }
        .search-box button { padding: 12px 20px; border: none; background: #333; color: white; border-radius: 0 20px 20px 0; cursor: pointer; }
        .search-box button:hover { background: #444; }

        /* Categorias (Tags) */
        .categories { display: flex; gap: 10px; overflow-x: auto; width: 100%; max-width: 800px; margin-bottom: 20px; padding-bottom: 5px; }
        .categories button { background: #272727; color: white; border: none; padding: 8px 16px; border-radius: 15px; cursor: pointer; white-space: nowrap; }
        .categories button:hover { background: #3f3f3f; }

        /* Área do Player Principal */
        .player-container { display: none; flex-direction: column; align-items: center; margin-bottom: 30px; background: #161616; padding: 15px; border-radius: 8px; }
        .video-wrapper { position: relative; width: 100%; max-width: 720px; padding-bottom: 40.25%; /* Proporção 16:9 */ height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 8px; }
        #countdown { margin-top: 10px; color: #aaa; font-style: italic; }

        /* Grade de Vídeos (Estilo Home do YouTube) */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .video-card { background: #161616; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.03); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card-info { padding: 10px; }
        .video-card-title { font-size: 14px; font-weight: bold; line-height: 1.4; height: 38px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    </style>
</head>
<body>

    <header>
        <h1>JN Som Player</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Pesquisar no YouTube...">
            <button onclick="searchVideos()">Buscar</button>
        </div>
        
        <div class="categories">
            <button onclick="quickSearch('Em alta')">🔥 Em alta</button>
            <button onclick="quickSearch('Músicas')">🎵 Músicas</button>
            <button onclick="quickSearch('Desenhos animados')">🎨 Desenhos</button>
            <button onclick="quickSearch('Mix de músicas')">🔀 Mix</button>
            <button onclick="quickSearch('Lo-fi')">☕ Lo-fi</button>
        </div>
    </header>

    <div class="player-container" id="player-container">
        <div class="video-wrapper">
            <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="countdown"></p>
    </div>

    <main class="video-grid" id="video-grid">
        </main>

    <script>
        // Instância pública do Invidious (usamos uma estável, mas pode ser trocada se necessário)
        const INVIDIOUS_INSTANCE = 'https://invidious.nerdvpn.de'; 
        
        let currentVideosList = [];
        let currentVideoIndex = 0;
        let timer;

        // Executa uma busca inicial para a página não abrir vazia (estilo Home)
        window.onload = () => {
            quickSearch('Músicas em alta');
        };

        // Atalho para os botões de categorias
        function quickSearch(term) {
            document.getElementById('search-input').value = term;
            searchVideos();
        }

        // Busca os vídeos de forma real na API do Invidious
        async function searchVideos() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<p>Buscando no YouTube...</p>';

            try {
                // Requisição para a API do Invidious buscando por vídeos
                const response = await fetch(`${INVIDIOUS_INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                const data = await response.json();
                
                currentVideosList = data; // Salva a lista atual de vídeos buscados
                renderGrid(data);
            } catch (error) {
                grid.innerHTML = '<p style="color: red;">Erro ao carregar vídeos. Tente novamente em instantes.</p>';
                console.error(error);
            }
        }

        // Renderiza as miniaturas na tela
        function renderGrid(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if (videos.length === 0) {
                grid.innerHTML = '<p>Nenhum vídeo encontrado.</p>';
                return;
            }

            videos.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(index);

                // Monta a estrutura da miniatura igual ao YouTube
                card.innerHTML = `
                    <img src="${video.videoThumbnails ? video.videoThumbnails[0].url : 'https://via.placeholder.com/320x180'}" alt="${video.title}">
                    <div class="video-card-info">
                        <div class="video-card-title">${video.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Executa o vídeo selecionado
        function playVideo(index) {
            clearTimeout(timer);
            document.getElementById('countdown').innerText = '';
            
            currentVideoIndex = index;
            const video = currentVideosList[index];
            
            const container = document.getElementById('player-container');
            const player = document.getElementById('main-player');
            
            container.style.display = 'flex';
            // Carrega o player de forma limpa. O parâmetro &listen=1 pode ser usado se quisesse apenas áudio, mas deixei vídeo normal.
            player.src = `${INVIDIOUS_INSTANCE}/embed/${video.videoId}?autoplay=1`;

            // Rola a tela suavemente para o player
            container.scrollIntoView({ behavior: 'smooth' });

            // Simulador de término: Como o iframe externo não avisa o fim exato por segurança do navegador,
            // programamos o gatilho automático baseado no tempo de duração do vídeo retornado pela API.
            const durationInMs = (video.lengthSeconds * 1000) || (3 * 60 * 1000); // Padrão 3 min se não achar
            
            timer = setTimeout(() => {
                startNextVideoCountdown();
            }, durationInMs);
        }

        // Inicia a contagem regressiva de 3 segundos para a próxima música parecida (próxima da lista)
        function startNextVideoCountdown() {
            let secondsLeft = 3;
            const countdownElement = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                countdownElement.innerText = `Próximo vídeo automático em ${secondsLeft} segundos...`;
                secondsLeft--;
                
                if (secondsLeft < 0) {
                    clearInterval(interval);
                    playNextVideo();
                }
            }, 1000);
        }

        // Passa para o próximo vídeo da lista de busca
        function playNextVideo() {
            let nextIndex = currentVideoIndex + 1;
            // Se chegar ao fim da lista, volta para o primeiro
            if (nextIndex >= currentVideosList.length) {
                nextIndex = 0;
            }
            playVideo(nextIndex);
        }
    </script>
</body>
</html>
