<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN Som Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #0f0f0f; color: white; padding: 20px; }
        
        /* Cabeçalho e Busca */
        header { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        h1 { color: #ff0000; font-size: 24px; letter-spacing: 1px; }
        .search-box { display: flex; width: 100%; max-width: 600px; }
        .search-box input { flex: 1; padding: 12px 18px; border: 1px solid #303030; border-radius: 20px 0 0 20px; background: #121212; color: white; outline: none; font-size: 16px; }
        .search-box button { padding: 12px 24px; border: none; background: #303030; color: white; border-radius: 0 20px 20px 0; cursor: pointer; font-weight: bold; }
        .search-box button:hover { background: #404040; }

        /* Categorias */
        .categories { display: flex; gap: 10px; overflow-x: auto; width: 100%; max-width: 800px; margin-bottom: 20px; padding-bottom: 5px; }
        .categories::-webkit-scrollbar { height: 4px; }
        .categories::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .categories button { background: #272727; color: white; border: none; padding: 8px 16px; border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .categories button:hover { background: #3f3f3f; }

        /* Player */
        .player-container { display: none; flex-direction: column; align-items: center; margin-bottom: 30px; background: #161616; padding: 15px; border-radius: 12px; border: 1px solid #272727; }
        .video-wrapper { position: relative; width: 100%; max-width: 720px; padding-bottom: 56.25%; /* 16:9 Perfeito */ height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 8px; }
        #countdown { margin-top: 12px; color: #00ffcc; font-weight: bold; font-size: 14px; }

        /* Grade de Vídeos */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .video-card { background: #161616; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s, background 0.2s; border: 1px solid #222; }
        .video-card:hover { transform: scale(1.02); background: #202020; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; }
        .video-card-info { padding: 12px; }
        .video-card-title { font-size: 14px; font-weight: bold; line-height: 1.4; height: 38px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #f1f1f1; }
        
        .status-msg { text-align: center; grid-column: 1 / -1; padding: 40px; color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <h1>JN Som Player</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Pesquisar músicas, desenhos e vídeos...">
            <button onclick="searchVideos()">Buscar</button>
        </div>
        
        <div class="categories">
            <button onclick="quickSearch('Músicas mais tocadas 2026')">🔥 Em alta</button>
            <button onclick="quickSearch('Músicas Nacionais e Internacionais')">🎵 Músicas</button>
            <button onclick="quickSearch('Desenhos Animados Completos')">🎨 Desenhos</button>
            <button onclick="quickSearch('Automotivo jn som')">🔊 Som Automotivo</button>
            <button onclick="quickSearch('Lo-fi para estudar')">☕ Relax</button>
        </div>
    </header>

    <div class="player-container" id="player-container">
        <div class="video-wrapper">
            <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="countdown"></p>
    </div>

    <main class="video-grid" id="video-grid">
        <div class="status-msg">Digite algo acima ou clique nas categorias para carregar...</div>
    </main>

    <script>
        // Uma lista estendida e atualizada de servidores "espelho" do YouTube
        const SERVIDORES_INVIDIOUS = [
            'https://vid.puffyan.us',
            'https://invidious.perennialte.ch',
            'https://inv.tux.digital',
            'https://invidious.projectsegfau.lt',
            'https://yewtu.be',
            'https://inv.tux.digital',
            'https://invidious.privacydev.net'
        ]; 
        
        let servidorAtualIndex = 0;
        let listaDeVideos = [];
        let videoAtualIndex = 0;
        let cronometroRegressivo;

        // Inicia com uma busca automática para não ficar vazio
        window.onload = () => {
            quickSearch('Músicas em alta');
        };

        function quickSearch(termo) {
            document.getElementById('search-input').value = termo;
            searchVideos();
        }

        // Tenta buscar o conteúdo rodando os servidores se algum falhar
        async function searchVideos() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="status-msg">Conectando ao banco de dados do YouTube...</div>';

            let carregou = false;
            let tentativas = 0;

            while (!carregou && tentativas < SERVIDORES_INVIDIOUS.length) {
                let urlServidor = SERVIDORES_INVIDIOUS[servidorAtualIndex];
                try {
                    // Timeout manual de 4 segundos para não prender o usuário se o servidor estiver lento
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);

                    const response = await fetch(`${urlServidor}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error();

                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        listaDeVideos = data;
                        renderizarProdutos(data);
                        carregou = true;
                    } else {
                        throw new Error();
                    }
                } catch (error) {
                    // Se falhar, passa silenciosamente para o próximo espelho da lista
                    servidorAtualIndex = (servidorAtualIndex + 1) % SERVIDORES_INVIDIOUS.length;
                    tentativas++;
                }
            }

            if (!carregou) {
                grid.innerHTML = '<div class="status-msg" style="color: #ff4d4d;">O tráfego está alto agora. Clique no botão "Buscar" novamente para mudar de linha de transmissão.</div>';
            }
        }

        function renderizarProdutos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            videos.forEach((video, index) => {
                // Filtra links quebrados de imagem
                let thumb = 'https://via.placeholder.com/320x180/161616/ffffff?text=Video';
                if (video.videoThumbnails && video.videoThumbnails.length > 0) {
                    thumb = video.videoThumbnails.find(t => t.quality === 'medium' || t.quality === 'default')?.url || video.videoThumbnails[0].url;
                }

                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => iniciarPlayer(index);
                card.innerHTML = `
                    <img src="${thumb}" alt="thumbnail" onerror="this.src='https://via.placeholder.com/320x180/161616/ffffff?text=Music'">
                    <div class="video-card-info">
                        <div class="video-card-title">${video.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function iniciarPlayer(index) {
            clearTimeout(cronometroRegressivo);
            document.getElementById('countdown').innerText = '';
            
            videoAtualIndex = index;
            const video = listaDeVideos[index];
            
            const container = document.getElementById('player-container');
            const player = document.getElementById('main-player');
            
            container.style.display = 'flex';
            
            // Monta o player usando o mesmo servidor que validou a busca
            player.src = `${SERVIDORES_INVIDIOUS[servidorAtualIndex]}/embed/${video.videoId}?autoplay=1&dark_mode=true`;

            container.scrollIntoView({ behavior: 'smooth' });

            // Pega o tempo do vídeo. Se não achar, assume 3 minutos (180s)
            const tempoDeEspera = (video.lengthSeconds * 1000) || (180 * 1000);
            
            cronometroRegressivo = setTimeout(() => {
                contagemTresSegundos();
            }, tempoDeEspera);
        }

        function contagemTresSegundos() {
            let segundos = 3;
            const aviso = document.getElementById('countdown');
            
            const intervalo = setInterval(() => {
                aviso.innerText = `Próxima faixa sintonizada automaticamente em ${segundos}s...`;
                segundos--;
                
                if (segundos < 0) {
                    clearInterval(intervalo);
                    proximoVideo();
                }
            }, 1000);
        }

        function proximoVideo() {
            videoAtualIndex++;
            if (videoAtualIndex >= listaDeVideos.length) {
                videoAtualIndex = 0; // Volta ao início da lista
            }
            iniciarPlayer(videoAtualIndex);
        }
    </script>
</body>
</html>
