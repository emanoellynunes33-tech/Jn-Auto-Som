<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN Som Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #0f0f0f; color: white; padding: 20px; }
        
        /* Cabeçalho e Busca */
        header { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        h1 { color: #ff0000; font-size: 24px; letter-spacing: 1px; }
        .search-box { display: flex; width: 100%; max-width: 600px; }
        .search-box input { flex: 1; padding: 12px 18px; border: 1px solid #303030; border-radius: 20px 0 0 20px; background: #121212; color: white; outline: none; font-size: 16px; }
        .search-box button { padding: 12px 24px; border: none; background: #303030; color: white; border-radius: 0 20px 20px 0; cursor: pointer; font-weight: bold; }
        .search-box button:hover { background: #404040; }

        /* Categorias */
        .categories { display: flex; gap: 10px; overflow-x: auto; width: 100%; max-width: 800px; margin-bottom: 20px; padding-bottom: 5px; }
        .categories::-webkit-scrollbar { height: 4px; }
        .categories::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .categories button { background: #272727; color: white; border: none; padding: 8px 16px; border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .categories button:hover { background: #3f3f3f; }

        /* Player */
        .player-container { display: none; flex-direction: column; align-items: center; margin-bottom: 30px; background: #161616; padding: 15px; border-radius: 12px; border: 1px solid #272727; }
        .video-wrapper { position: relative; width: 100%; max-width: 720px; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 8px; }
        #countdown { margin-top: 12px; color: #00ffcc; font-weight: bold; font-size: 14px; }

        /* Grade de Vídeos */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .video-card { background: #161616; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s, background 0.2s; border: 1px solid #222; }
        .video-card:hover { transform: scale(1.02); background: #202020; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; }
        .video-card-info { padding: 12px; }
        .video-card-title { font-size: 14px; font-weight: bold; line-height: 1.4; height: 38px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #f1f1f1; }
        
        .status-msg { text-align: center; grid-column: 1 / -1; padding: 40px; color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <h1>JN Som Player</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Pesquisar músicas, desenhos e vídeos...">
            <button onclick="searchVideos()">Buscar</button>
        </div>
        
        <div class="categories">
            <button onclick="quickSearch('Músicas mais tocadas')">🔥 Em alta</button>
            <button onclick="quickSearch('Músicas novas')">🎵 Músicas</button>
            <button onclick="quickSearch('Desenhos Animados Infantis')">🎨 Desenhos</button>
            <button onclick="quickSearch('Som Automotivo')">🔊 Som Automotivo</button>
            <button onclick="quickSearch('Lo-fi')">☕ Relax</button>
        </div>
    </header>

    <div class="player-container" id="player-container">
        <div class="video-wrapper">
            <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="countdown"></p>
    </div>

    <main class="video-grid" id="video-grid">
        <div class="status-msg">Carregando a página inicial...</div>
    </main>

    <script>
        let listaDeVideos = [];
        let videoAtualIndex = 0;
        let cronometroRegressivo;

        window.onload = () => {
            quickSearch('Músicas');
        };

        function quickSearch(termo) {
            document.getElementById('search-input').value = termo;
            searchVideos();
        }

        // Busca usando a API aberta do DuckDuckGo para vídeos do YouTube
        async function searchVideos() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="status-msg">Buscando no YouTube...</div>';

            try {
                // Script dinâmico (JSONP) para burlar o bloqueio de segurança do navegador sem precisar de servidor
                const script = document.createElement('script');
                const callbackName = 'ddg_callback_' + Math.floor(Math.random() * 100000);
                
                window[callbackName] = function(data) {
                    if (data && data.results) {
                        // Filtra apenas vídeos que vieram do YouTube
                        listaDeVideos = data.results
                            .filter(v => v.id.includes('youtube.com') || v.id.includes('youtu.be'))
                            .map(v => {
                                // Extrai o ID do vídeo do link do YouTube
                                let videoId = '';
                                if(v.id.includes('v=')) videoId = v.id.split('v=')[1].split('&')[0];
                                else videoId = v.id.split('/').pop();

                                return {
                                    title: v.title,
                                    videoId: videoId,
                                    thumbnail: v.image,
                                    duration: v.duration
                                };
                            });

                        renderizarProdutos(listaDeVideos);
                    }
                    document.body.removeChild(script);
                    delete window[callbackName];
                };

                script.src = `https://api.duckduckgo.com/?q=${encodeURIComponent(query + " site:youtube.com")}&format=json&callback=${callbackName}`;
                document.body.appendChild(script);

            } catch (error) {
                // Se falhar, usa uma rota direta de emergência
                grid.innerHTML = '<div class="status-msg">Erro na rede. Digite novamente e clique em buscar.</div>';
            }
        }

        function renderizarProdutos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if(videos.length === 0) {
                grid.innerHTML = '<div class="status-msg">Nenhum vídeo encontrado. Tente outra palavra-chave!</div>';
                return;
            }

            videos.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => iniciarPlayer(index);
                card.innerHTML = `
                    <img src="${video.thumbnail}" alt="thumbnail" onerror="this.src='https://images.unsplash.com/photo-1614680376593-902f74fa0d41?w=320'">
                    <div class="video-card-info">
                        <div class="video-card-title">${video.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function iniciarPlayer(index) {
            clearTimeout(cronometroRegressivo);
            document.getElementById('countdown').innerText = '';
            
            videoAtualIndex = index;
            const video = listaDeVideos[index];
            
            const container = document.getElementById('player-container');
            const player = document.getElementById('main-player');
            
            container.style.display = 'flex';
            
            // Player do YouTube profissional e limpo (youtube-nocookie)
            player.src = `https://www.youtube-nocookie.com/embed/${video.videoId}?autoplay=1`;

            container.scrollIntoView({ behavior: 'smooth' });

            // Converte a duração do vídeo (Ex: "3:45") para milissegundos
            let segundos = 180; // Padrão 3 minutos se falhar
            if(video.duration) {
                let partes = video.duration.split(':').map(Number);
                if(partes.length === 2) segundos = (partes[0] * 60) + partes[1];
                if(partes.length === 3) segundos = (partes[0] * 3600) + (partes[1] * 60) + partes[2];
            }
            
            cronometroRegressivo = setTimeout(() => {
                contagemTresSegundos();
            }, segundos * 1000);
        }

        function contagemTresSegundos() {
            let segundos = 3;
            const aviso = document.getElementById('countdown');
            
            const intervalo = setInterval(() => {
                aviso.innerText = `Próxima música tocando sozinha em ${segundos}s...`;
                segundos--;
                
                if (segundos < 0) {
                    clearInterval(intervalo);
                    proximoVideo();
                }
            }, 1000);
        }

        function proximoVideo() {
            videoAtualIndex++;
            if (videoAtualIndex >= listaDeVideos.length) {
                videoAtualIndex = 0; 
            }
            iniciarPlayer(videoAtualIndex);
        }
    </script>
</body>
</html>
